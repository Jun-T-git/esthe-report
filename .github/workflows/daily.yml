name: 日次データ収集・集計

on:
  schedule:
    # 毎日8時（JST）= UTC 23時（前日）
    - cron: "0 23 * * *"
  workflow_dispatch:  # 手動実行用

jobs:
  collect-and-aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # DBをcommit & pushするために必要

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          # DBの最新状態を取得するためfetch-depth=1で十分
          fetch-depth: 1

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 生データ収集
        run: python src/collect.py

      - name: 日別集計
        run: python src/aggregate.py --mode=daily

      - name: 週別集計
        run: python src/aggregate.py --mode=weekly

      - name: 記事下書き生成
        run: python src/generate_article.py

      - name: DB・記事をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aroma_more.db output/
          # 変更がなければ何もしない
          git diff --cached --quiet || git commit -m "chore: daily snapshot $(date -u +%Y-%m-%d)"
          git push
